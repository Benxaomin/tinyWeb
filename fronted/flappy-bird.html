<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird - 排行榜竞技版</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 30%, #2c5364 60%, #0f2027 100%);
            font-family: 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
            color: #c8c0b0;
        }

        /* ==================== 导航栏 ==================== */
        .navbar {
            width: 100%;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(20, 20, 30, 0.7);
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(200, 192, 176, 0.1);
        }

        .nav-brand {
            font-family: 'Pacifico', cursive;
            font-size: 24px;
            color: #f0945e;
            text-decoration: none;
            text-shadow: 0 0 15px rgba(240, 148, 94, 0.4);
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #c8c0b0;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            background: rgba(240, 148, 94, 0.15);
            color: #f0945e;
        }

        /* ==================== 登录提示条 ==================== */
        .login-banner {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, rgba(240, 148, 94, 0.9), rgba(232, 168, 109, 0.9));
            color: #0f2027;
            text-align: center;
            font-size: 14px;
            display: none;
            font-weight: 500;
        }

        .login-banner.show {
            display: block;
        }

        .login-banner a {
            color: white;
            text-decoration: underline;
            font-weight: bold;
            margin-left: 10px;
        }

        /* ==================== 主容器 ==================== */
        .main-container {
            flex: 1;
            display: flex;
            padding: 20px;
            gap: 30px;
            max-width: 1600px;
            width: 100%;
        }

        /* ==================== 游戏区域 ==================== */
        .game-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-wrapper {
            position: relative;
            background: rgba(20, 20, 30, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            border: 2px solid rgba(200, 192, 176, 0.2);
        }

        #gameCanvas {
            display: block;
        }

        /* 分数显示 */
        .score-display {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Pacifico', cursive;
            font-size: 48px;
            color: #f0945e;
            text-shadow: 0 0 20px rgba(240, 148, 94, 0.5), 3px 3px 6px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        /* 游戏状态提示 */
        .game-status {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 20;
            display: none;
        }

        .game-status.show {
            display: block;
        }

        .status-title {
            font-family: 'Pacifico', cursive;
            font-size: 36px;
            color: #f0945e;
            margin-bottom: 15px;
            text-shadow: 0 0 15px rgba(240, 148, 94, 0.4), 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .status-subtitle {
            font-size: 16px;
            color: rgba(200, 192, 176, 0.7);
            margin-bottom: 20px;
        }

        .start-btn {
            padding: 15px 40px;
            font-size: 20px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #f0945e, #e8a86d);
            color: #0f2027;
            cursor: pointer;
            font-family: 'Pacifico', cursive;
            box-shadow: 0 8px 25px rgba(240, 148, 94, 0.4);
            transition: all 0.3s ease;
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(240, 148, 94, 0.5);
        }

        /* 操作说明 */
        .controls-hint {
            margin-top: 20px;
            padding: 15px 25px;
            background: rgba(20, 20, 30, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            color: #c8c0b0;
            font-size: 14px;
            display: flex;
            gap: 20px;
            align-items: center;
            border: 1px solid rgba(200, 192, 176, 0.1);
        }

        .control-key {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 5px 12px;
            background: linear-gradient(135deg, #f0945e, #e8a86d);
            color: #0f2027;
            border-radius: 8px;
            font-weight: bold;
            font-size: 12px;
        }

        /* ==================== 排行榜区域 ==================== */
        .leaderboard-section {
            width: 400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .leaderboard-card {
            background: rgba(20, 20, 30, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(200, 192, 176, 0.1);
            transition: all 0.3s ease;
        }

        .leaderboard-card.global {
            border-color: rgba(255, 215, 0, 0.5);
        }

        .leaderboard-card.personal {
            border-color: rgba(240, 148, 94, 0.5);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px dashed #eee;
        }

        .card-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .card-icon.global {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
        }

        .card-icon.personal {
            background: linear-gradient(135deg, #f0945e, #e8a86d);
        }

        .card-title {
            font-size: 18px;
            font-weight: bold;
            color: #f5eee3;
        }

        .card-subtitle {
            font-size: 12px;
            color: rgba(200, 192, 176, 0.6);
        }

        /* 榜单列表 */
        .leaderboard-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .leaderboard-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .leaderboard-item:hover {
            background: rgba(240, 148, 94, 0.1);
            transform: translateX(5px);
        }

        .leaderboard-item.my-score {
            background: linear-gradient(135deg, rgba(240, 148, 94, 0.2), rgba(232, 168, 109, 0.1));
            border: 1px solid rgba(240, 148, 94, 0.5);
        }

        .rank-badge {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            margin-right: 12px;
        }

        .rank-badge.top1 {
            background: #ffd700;
            color: #fff;
        }

        .rank-badge.top2 {
            background: #c0c0c0;
            color: #fff;
        }

        .rank-badge.top3 {
            background: #cd7f32;
            color: #fff;
        }

        .rank-badge.other {
            background: #e0e0e0;
            color: #666;
        }

        .player-info {
            flex: 1;
        }

        .player-name {
            font-weight: 600;
            color: #f5eee3;
            font-size: 14px;
        }

        .player-meta {
            font-size: 11px;
            color: rgba(200, 192, 176, 0.6);
            margin-top: 2px;
        }

        .player-score {
            font-family: 'Pacifico', cursive;
            font-size: 20px;
            color: #f0945e;
        }

        /* 加载状态 */
        .loading-placeholder {
            text-align: center;
            padding: 30px;
            color: #999;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f0f0f0;
            border-top-color: #e8a86d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 统计信息 */
        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: rgba(20, 20, 30, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-top: auto;
            border: 1px solid rgba(200, 192, 176, 0.1);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-family: 'Pacifico', cursive;
            font-size: 24px;
            color: #f0945e;
        }

        .stat-label {
            font-size: 11px;
            color: rgba(200, 192, 176, 0.6);
            margin-top: 5px;
        }

        /* 提示toast */
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            padding: 15px 30px;
            border-radius: 30px;
            color: white;
            font-size: 14px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            background: linear-gradient(135deg, #52c41a, #73d13d);
        }

        .toast.error {
            background: linear-gradient(135deg, #f5222d, #ff4d4f);
        }

        .toast.info {
            background: linear-gradient(135deg, #f0945e, #e8a86d);
        }

        /* 游戏结束弹窗 */
        .game-over-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .game-over-modal.show {
            display: flex;
        }

        .modal-content {
            background: rgba(20, 20, 30, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            animation: bounceIn 0.5s ease;
            border: 1px solid rgba(200, 192, 176, 0.2);
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }

        .modal-title {
            font-family: 'Pacifico', cursive;
            font-size: 36px;
            color: #f0945e;
            margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(240, 148, 94, 0.3);
        }

        .final-score {
            font-family: 'Pacifico', cursive;
            font-size: 72px;
            color: #f0945e;
            margin: 20px 0;
            text-shadow: 0 0 20px rgba(240, 148, 94, 0.5);
        }

        .save-score-hint {
            color: #52c41a;
            font-size: 14px;
            margin-top: 10px;
            padding: 8px 15px;
            background: rgba(82, 196, 26, 0.15);
            border-radius: 20px;
            display: inline-block;
        }

        .no-save-hint {
            color: rgba(200, 192, 176, 0.7);
            font-size: 13px;
            margin-top: 10px;
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            display: inline-block;
        }

        .no-save-hint a {
            color: #f0945e;
            text-decoration: none;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        .modal-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        .modal-btn.primary {
            background: linear-gradient(135deg, #f0945e, #e8a86d);
            color: #0f2027;
        }

        .modal-btn.secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #c8c0b0;
        }

        .modal-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        /* 新纪录标识 */
        .new-record-badge {
            display: inline-block;
            background: linear-gradient(135deg, #ffd700, #ffb700);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 10px;
            animation: pulse 1s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* 响应式 */
        @media (max-width: 1200px) {
            .main-container {
                flex-direction: column;
                align-items: center;
            }

            .leaderboard-section {
                width: 100%;
                max-width: 600px;
            }
        }

        @media (max-width: 600px) {
            .game-wrapper {
                border-radius: 10px;
                border-width: 2px;
            }

            .navbar {
                padding: 10px 15px;
            }

            .nav-brand {
                font-size: 18px;
            }

            .nav-links span:not(.material-symbols-outlined) {
                display: none;
            }

            .controls-hint {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="index.html" class="nav-brand">✨ TinyWeb1</a>
        <div class="nav-links">
            <a href="index.html" class="nav-link">
                <span class="material-symbols-outlined">home</span>
                <span>首页</span>
            </a>
            <a href="#" class="nav-link" onclick="refreshLeaderboard()">
                <span class="material-symbols-outlined">refresh</span>
                <span>刷新榜单</span>
            </a>
        </div>
    </nav>

    <!-- 未登录提示条 -->
    <div class="login-banner" id="loginBanner">
        🎮 登录后游玩可参与排行榜排名！<a href="index.html">去登录</a>
    </div>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 游戏区域 -->
        <section class="game-section">
            <div class="game-wrapper">
                <canvas id="gameCanvas" width="400" height="600"></canvas>
                <div class="score-display" id="scoreDisplay">0</div>
                
                <!-- 游戏状态提示 -->
                <div class="game-status show" id="gameStatus">
                    <h2 class="status-title">Flappy Bird</h2>
                    <p class="status-subtitle">点击按钮开始游戏</p>
                    <button class="start-btn" id="startBtn" onclick="startGame()">开始游戏</button>
                </div>
            </div>
            
            <!-- 操作说明 -->
            <div class="controls-hint">
                <span><span class="control-key">空格</span> 或 <span class="control-key">↑</span> 跳跃</span>
                <span><span class="control-key">P</span> 暂停/继续</span>
            </div>
        </section>

        <!-- 排行榜区域 -->
        <aside class="leaderboard-section">
            <!-- 全服排行榜 -->
            <div class="leaderboard-card global">
                <div class="card-header">
                    <div class="card-icon global">🏆</div>
                    <div>
                        <div class="card-title">全服排行榜</div>
                        <div class="card-subtitle">Top 10 最强玩家</div>
                    </div>
                </div>
                <div class="leaderboard-list" id="globalLeaderboard">
                    <div class="loading-placeholder">
                        <div class="loading-spinner"></div>
                        <div>加载中...</div>
                    </div>
                </div>
            </div>

            <!-- 个人排行榜 -->
            <div class="leaderboard-card personal">
                <div class="card-header">
                    <div class="card-icon personal">⭐</div>
                    <div>
                        <div class="card-title">我的记录</div>
                        <div class="card-subtitle" id="personalSubtitle">个人 Top 5</div>
                    </div>
                </div>
                <div class="leaderboard-list" id="personalLeaderboard">
                    <div class="loading-placeholder">
                        <div class="loading-spinner"></div>
                        <div>加载中...</div>
                    </div>
                </div>
            </div>

            <!-- 统计信息 -->
            <div class="stats-bar">
                <div class="stat-item">
                    <div class="stat-value" id="myBestScore">-</div>
                    <div class="stat-label">我的最高分</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="totalPlayers">-</div>
                    <div class="stat-label">总参与人数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="totalGames">-</div>
                    <div class="stat-label">总游戏次数</div>
                </div>
            </div>
        </aside>
    </div>

    <!-- Toast提示 -->
    <div class="toast" id="toast"></div>

    <!-- 游戏结束弹窗 -->
    <div class="game-over-modal" id="gameOverModal">
        <div class="modal-content">
            <div class="modal-title">游戏结束!</div>
            <div class="final-score" id="finalScore">0</div>
            <div style="color: #666; font-size: 14px;">
                本次得分: <span id="scoreValue" style="color: #e8a86d; font-weight: bold;">0</span>
                <span id="newRecordBadge" class="new-record-badge" style="display: none;">新纪录! 🎉</span>
            </div>
            <div id="scoreSaveHint" class="save-score-hint" style="display: none;">
                ✓ 得分已保存到排行榜
            </div>
            <div id="noSaveHint" class="no-save-hint" style="display: none;">
                登录后可保存得分参与排名，<a href="index.html">去登录</a>
            </div>
            <div class="modal-buttons">
                <button class="modal-btn primary" onclick="restartGame()">再玩一次</button>
                <button class="modal-btn secondary" onclick="closeModal()">关闭</button>
            </div>
        </div>
    </div>

    <script src="flappy-bird.js"></script>
    <script>
        // ==================== 排行榜功能 ====================
        
        const API_BASE = '/api';
        let myBestScore = 0;
        let isGameRunning = false;
        // isPaused 已经在 flappy-bird.js 中定义，不要重复声明
        let currentScore = 0;

        // 获取token - 支持多种存储方式
        // 注意：主站使用 'tinyweb_token' 作为 key
        function getToken() {
            // 优先尝试主站使用的 key
            let token = localStorage.getItem('tinyweb_token');
            if (token) return token;
            
            // 兼容旧版 'token' key
            token = localStorage.getItem('token');
            if (token) {
                // 迁移到新的 key
                localStorage.setItem('tinyweb_token', token);
                return token;
            }
            
            // 尝试从 sessionStorage 获取
            token = sessionStorage.getItem('token');
            if (token) return token;
            
            // 尝试从 Cookie 获取
            const cookies = document.cookie.split(';');
            for (let cookie of cookies) {
                const [name, value] = cookie.trim().split('=');
                if (name === 'token' && value) {
                    // 保存到 localStorage 以便后续使用
                    localStorage.setItem('tinyweb_token', value);
                    return value;
                }
            }
            
            return null;
        }

        // 检查登录状态
        function isLoggedIn() {
            return !!getToken();
        }

        // 显示提示
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 加载排行榜数据 - 不需要登录
        async function loadLeaderboard() {
            showToast('正在加载排行榜...', 'info');
            
            try {
                // 获取全服排行榜（公开接口）
                const response = await fetch(`${API_BASE}/game/flappy-bird/leaderboard`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Cache-Control': 'no-cache'
                    },
                    credentials: 'include' // 允许携带 cookie
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                if (data.code === 0) {
                    renderLeaderboard(data.data);
                    showToast('排行榜加载完成', 'success');
                } else {
                    showToast(data.message || '加载失败', 'error');
                }
            } catch (error) {
                console.error('加载排行榜失败:', error);
                showToast('网络连接失败，显示离线模式', 'error');
                
                // 显示离线状态
                document.getElementById('globalLeaderboard').innerHTML = `
                    <div class="loading-placeholder" style="padding: 30px;">
                        <div style="font-size: 40px; margin-bottom: 15px;">📡</div>
                        <div style="color: #999; font-size: 14px;">网络连接失败</div>
                        <div style="color: #ccc; font-size: 12px; margin-top: 5px;">请检查网络后重试</div>
                    </div>
                `;
                document.getElementById('personalLeaderboard').innerHTML = `
                    <div class="loading-placeholder" style="padding: 20px;">
                        <div style="font-size: 32px; margin-bottom: 10px;">😢</div>
                        <div>暂时无法加载排行榜</div>
                        <a href="#" onclick="location.reload()" style="display: inline-block; margin-top: 10px; padding: 8px 16px; border-radius: 15px; background: #e8a86d; color: #1a1a2e; text-decoration: none; font-size: 12px;">刷新重试</a>
                    </div>
                `;
                
                document.getElementById('totalPlayers').textContent = '-';
                document.getElementById('totalGames').textContent = '-';
                document.getElementById('myBestScore').textContent = isLoggedIn() ? '0' : '-';
            }
        }

        // 渲染排行榜
        function renderLeaderboard(data) {
            if (!data) {
                console.warn('排行榜数据为空');
                return;
            }
            
            // 更新统计数据
            document.getElementById('totalGames').textContent = formatNumber(data.total_plays || 0);
            
            // 渲染全服Top10
            const globalList = document.getElementById('globalLeaderboard');
            if (data.global_top10 && data.global_top10.length > 0) {
                globalList.innerHTML = data.global_top10.map((item, index) => `
                    <div class="leaderboard-item ${item.is_me ? 'my-score' : ''}">
                        <div class="rank-badge ${getRankClass(index + 1)}">${index + 1}</div>
                        <div class="player-info">
                            <div class="player-name">${escapeHtml(item.username)}</div>
                            <div class="player-meta">${formatDate(item.played_at)}</div>
                        </div>
                        <div class="player-score">${item.score}</div>
                    </div>
                `).join('');
                
                // 更新总参与人数（基于全球榜）
                const uniquePlayers = new Set(data.global_top10.map(item => item.username)).size;
                document.getElementById('totalPlayers').textContent = uniquePlayers;
            } else {
                globalList.innerHTML = `
                    <div class="loading-placeholder" style="padding: 30px;">
                        <div style="font-size: 40px; margin-bottom: 10px;">🎮</div>
                        <div style="color: #666;">暂无数据</div>
                        <div style="color: #999; font-size: 12px; margin-top: 5px;">快来抢占第一吧！</div>
                    </div>`;
                document.getElementById('totalPlayers').textContent = '0';
            }

            // 渲染个人记录（仅登录时）
            const personalList = document.getElementById('personalLeaderboard');
            const personalSubtitle = document.getElementById('personalSubtitle');
            
            if (isLoggedIn()) {
                if (data.my_top5 && data.my_top5.length > 0) {
                    personalList.innerHTML = data.my_top5.map((item, index) => `
                        <div class="leaderboard-item my-score">
                            <div class="rank-badge ${getRankClass(index + 1)}">${index + 1}</div>
                            <div class="player-info">
                                <div class="player-name">${escapeHtml(item.username)}</div>
                                <div class="player-meta">${formatDate(item.played_at)}</div>
                            </div>
                            <div class="player-score">${item.score}</div>
                        </div>
                    `).join('');
                    
                    myBestScore = data.my_top5[0].score;
                    personalSubtitle.textContent = '个人 Top 5';
                } else {
                    personalList.innerHTML = `
                        <div class="loading-placeholder" style="padding: 30px;">
                            <div style="font-size: 40px; margin-bottom: 10px;">🎯</div>
                            <div style="color: #666;">你还没有玩过</div>
                            <div style="color: #999; font-size: 12px; margin-top: 5px;">快来试试吧！</div>
                        </div>`;
                    myBestScore = 0;
                    personalSubtitle.textContent = '个人 Top 5';
                }
                document.getElementById('myBestScore').textContent = myBestScore;
            } else {
                // 未登录状态
                personalList.innerHTML = `
                    <div class="loading-placeholder" style="padding: 20px;">
                        <div style="font-size: 40px; margin-bottom: 10px;">🔒</div>
                        <div style="color: #666; margin-bottom: 15px;">登录后查看个人记录</div>
                        <a href="index.html" style="display: inline-block; padding: 10px 20px; border-radius: 20px; background: linear-gradient(135deg, #e8a86d, #f0945e); color: #1a1a2e; text-decoration: none; font-size: 14px; font-weight: bold;">去登录</a>
                    </div>
                `;
                personalSubtitle.textContent = '请先登录';
                document.getElementById('myBestScore').textContent = '-';
            }
        }

        // 获取排名样式类
        function getRankClass(rank) {
            if (rank === 1) return 'top1';
            if (rank === 2) return 'top2';
            if (rank === 3) return 'top3';
            return 'other';
        }

        // 保存游戏得分 - 只有登录后才保存
        async function saveGameScore(score, gameTime) {
            const token = getToken();
            if (!token) {
                console.log('未登录，得分不保存');
                return false;
            }

            try {
                const response = await fetch(`${API_BASE}/game/flappy-bird/score`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        score: score,
                        game_time: gameTime
                    }),
                    credentials: 'include'
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                if (data.code === 0) {
                    console.log('得分已保存:', score);
                    // 刷新排行榜
                    loadLeaderboard();
                    return true;
                }
                console.warn('保存得分失败:', data.message);
                return false;
            } catch (error) {
                console.error('保存得分失败:', error);
                return false;
            }
        }

        // 游戏结束处理
        async function onGameOver(score) {
            currentScore = score;
            const gameTime = Math.floor(Date.now() / 1000);
            
            // 显示游戏结束弹窗
            document.getElementById('scoreValue').textContent = score;
            document.getElementById('finalScore').textContent = score;
            
            // 检查是否新纪录（仅登录用户）
            const isNewRecord = isLoggedIn() && score > myBestScore;
            document.getElementById('newRecordBadge').style.display = isNewRecord ? 'inline-block' : 'none';
            
            // 保存得分并更新UI
            const saveHint = document.getElementById('scoreSaveHint');
            const noSaveHint = document.getElementById('noSaveHint');
            
            if (isLoggedIn()) {
                const saved = await saveGameScore(score, gameTime);
                if (saved) {
                    saveHint.style.display = 'inline-block';
                    saveHint.textContent = '✓ 得分已保存到排行榜';
                    noSaveHint.style.display = 'none';
                } else {
                    saveHint.style.display = 'none';
                    noSaveHint.style.display = 'inline-block';
                    noSaveHint.innerHTML = '得分保存失败，<a href="#" onclick="retrySaveScore(' + score + ')">点击重试</a>';
                }
            } else {
                saveHint.style.display = 'none';
                noSaveHint.style.display = 'inline-block';
                noSaveHint.innerHTML = `
                    登录后可保存得分参与排名<br>
                    <a href="index.html" style="display: inline-block; margin-top: 8px; padding: 6px 16px; border-radius: 15px; background: #e8a86d; color: #1a1a2e; text-decoration: none;">去登录</a>
                `;
            }
            
            setTimeout(() => {
                document.getElementById('gameOverModal').classList.add('show');
            }, 500);
        }

        // 重试保存分数
        async function retrySaveScore(score) {
            showToast('正在重试保存...', 'info');
            const gameTime = Math.floor(Date.now() / 1000);
            const saved = await saveGameScore(score, gameTime);
            if (saved) {
                showToast('保存成功！', 'success');
                document.getElementById('scoreSaveHint').style.display = 'inline-block';
                document.getElementById('noSaveHint').style.display = 'none';
            } else {
                showToast('保存失败，请检查网络', 'error');
            }
        }

        // 关闭弹窗
        function closeModal() {
            document.getElementById('gameOverModal').classList.remove('show');
            document.getElementById('scoreSaveHint').style.display = 'none';
            document.getElementById('noSaveHint').style.display = 'none';
            resetGameUI();
        }

        // 重新开始游戏
        function restartGame() {
            document.getElementById('gameOverModal').classList.remove('show');
            document.getElementById('scoreSaveHint').style.display = 'none';
            document.getElementById('noSaveHint').style.display = 'none';
            startGame();
        }

        // 刷新排行榜
        async function refreshLeaderboard() {
            const btn = document.querySelector('.nav-link[onclick="refreshLeaderboard()"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined" style="animation: spin 1s linear infinite;">refresh</span> 刷新中...';
            
            showToast('正在刷新排行榜...', 'info');
            await loadLeaderboard();
            
            setTimeout(() => {
                btn.innerHTML = originalText;
            }, 1000);
        }

        // 格式化日期
        function formatDate(dateStr) {
            try {
                const date = new Date(dateStr);
                if (isNaN(date.getTime())) {
                    return '刚刚';
                }
                return `${date.getMonth() + 1}月${date.getDate()}日`;
            } catch (e) {
                return '刚刚';
            }
        }

        // 格式化数字
        function formatNumber(num) {
            if (num === undefined || num === null) return '0';
            if (num >= 10000) {
                return (num / 10000).toFixed(1) + '万';
            }
            return num.toString();
        }

        // HTML转义
        function escapeHtml(text) {
            if (typeof text !== 'string') return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 检查登录状态并显示提示
            if (isLoggedIn()) {
                console.log('用户已登录，token:', getToken().substring(0, 10) + '...');
                document.getElementById('loginBanner').classList.remove('show');
            } else {
                console.log('用户未登录');
                document.getElementById('loginBanner').classList.add('show');
            }
            
            // 延迟加载排行榜，确保页面渲染完成
            setTimeout(() => {
                loadLeaderboard();
            }, 100);
            
            // 初始化游戏
            initGame();
        });

        // ==================== 游戏控制桥接 ====================
        
        function initGame() {
            // 等待 flappy-bird.js 加载完成
            const checkGameLoaded = () => {
                if (typeof window.resetGame === 'function') {
                    console.log('✓Flappy Bird 游戏脚本已加载');
                    
                    // 保存原始的游戏开始函数
                    window._flappyBirdStart = window.startGame;
                    
                    // 监听游戏结束事件
                    window.addEventListener('gameOver', function(e) {
                        console.log('接收到游戏结束事件，得分:', e.detail);
                        onGameOver(e.detail);
                    });
                } else {
                    // 如果游戏脚本还没加载，等待一下再检查
                    console.log('等待游戏脚本加载...');
                    setTimeout(checkGameLoaded, 100);
                }
            };
            
            checkGameLoaded();
        }

        function startGame() {
            console.log('开始游戏');
            document.getElementById('gameStatus').classList.remove('show');
            window.isGameRunning = true;
            
            // 调用原始游戏开始函数
            if (typeof window._flappyBirdStart === 'function') {
                window._flappyBirdStart();
            } else {
                console.error('游戏初始化失败：startGame 函数未找到');
                showToast('游戏加载失败，请刷新页面重试', 'error');
            }
        }

        function resetGameUI() {
            console.log('重置游戏UI');
            document.getElementById('gameStatus').classList.add('show');
            window.isGameRunning = false;
        }
    </script>
</body>
</html>
